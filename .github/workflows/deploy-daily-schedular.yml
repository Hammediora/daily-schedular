name: Deploy daily-schedular

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/hammediora/daily-schedular
  APP_DIR: ~/apps/daily-schedular
  CONTAINER_NAME: daily-schedular-app
  APP_HOST_PORT: 3040

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_DIR: ${{ env.APP_DIR }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_HOST_PORT: ${{ env.APP_HOST_PORT }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEXT_TELEMETRY_DISABLED: ${{ secrets.NEXT_TELEMETRY_DISABLED || '1' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_NAME,APP_DIR,CONTAINER_NAME,APP_HOST_PORT,IMAGE_TAG,GHCR_USERNAME,GHCR_PAT,DATABASE_URL,REDIS_URL,NEXT_TELEMETRY_DISABLED
          script_stop: true
          script: |
            set -eu

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_PAT:-}" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            if [ -n "${DATABASE_URL:-}" ] && [ -n "${REDIS_URL:-}" ]; then
              cat > .env <<EOF
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL}
            NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED:-1}
            EOF
            elif [ ! -f .env ]; then
              echo "Missing DATABASE_URL/REDIS_URL secrets and no existing .env found at ${APP_DIR}/.env"
              exit 1
            fi

            docker pull "${IMAGE_NAME}:${IMAGE_TAG}"
            docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"

            docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file .env \
              -p "127.0.0.1:${APP_HOST_PORT}:3000" \
              "${IMAGE_NAME}:latest"

            docker image prune -f
